<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pool League Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
      <link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column py-2">
    <div class="brand">🎱 <span>Pool</span> League</div>

    <!-- League Switcher -->
    <div class="league-picker">
      <label>League</label>
      <select class="form-select form-select-sm" id="league-select">
        <option value="">Loading…</option>
      </select>
    </div>

    <div class="active-season" id="active-season-label">No active season</div>

    <ul class="nav flex-column mt-1">
      <li class="nav-item"><a class="nav-link active" href="#" data-section="dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="seasons"><i class="bi bi-calendar3"></i> Seasons</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="teams"><i class="bi bi-people-fill"></i> Teams</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="players"><i class="bi bi-person-badge"></i> Players</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="schedule"><i class="bi bi-calendar-week"></i> Schedule</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="lineup"><i class="bi bi-person-check"></i> Lineup</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="entry"><i class="bi bi-pencil-square"></i> Match Entry</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="standings"><i class="bi bi-trophy"></i> Standings</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="stats"><i class="bi bi-bar-chart-line"></i> Player Stats</a></li>
      <li class="nav-item"><a class="nav-link" href="#" data-section="handicap"><i class="bi bi-graph-up-arrow"></i> Handicap</a></li>
    </ul>

    <div class="mt-auto px-3 pb-3">
      <button class="btn btn-sm btn-outline-secondary w-100 mb-2" data-action="manage-leagues"><i class="bi bi-gear"></i> Manage Leagues</button>
      <button class="btn btn-sm btn-outline-secondary w-100" data-action="backup"><i class="bi bi-cloud-download"></i> Backup DB</button>
    </div>
  </nav>

  <!-- Main -->
  <div class="main-content">

    <!-- Dashboard -->
    <div id="section-dashboard" class="section active">
      <dashboard-page></dashboard-page>
    </div>

    <!-- Seasons -->
    <div id="section-seasons" class="section">
      <seasons-page></seasons-page>
    </div>

    <!-- Teams -->
    <div id="section-teams" class="section">
      <teams-page></teams-page>
    </div>

    <!-- Players -->
    <div id="section-players" class="section">
      <players-page></players-page>
    </div>

    <!-- Schedule -->
    <div id="section-schedule" class="section">
      <schedule-page></schedule-page>
    </div>

    <!-- Lineup Planning -->
    <div id="section-lineup" class="section">
      <lineup-page></lineup-page>
    </div>

    <!-- Match Entry -->
    <div id="section-entry" class="section">
      <match-entry-page></match-entry-page>
    </div>

    <!-- Standings -->
    <div id="section-standings" class="section">
      <standings-section></standings-section>
    </div>

    <!-- Player Stats -->
    <div id="section-stats" class="section">
      <stats-section></stats-section>
    </div>

    <!-- Handicap Review -->
    <div id="section-handicap" class="section">
      <handicaps-page></handicaps-page>
    </div>

  </div><!-- /main -->
</div><!-- /flex -->

<!-- Toast container -->
<div id="toast-container"></div>

<!-- ── Modals ─────────────────────────────────────────────────────────────── -->

<leagues-page></leagues-page>

<!-- Assign Match Teams Modal -->
<div class="modal fade" id="assign-match-modal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0">Assign Teams to Slot</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="assign-match-id">
        <div class="mb-2">
          <label class="form-label small mb-1">Home Team</label>
          <select class="form-select form-select-sm" id="assign-home-select">
            <option value="">(unassigned)</option>
          </select>
        </div>
        <div>
          <label class="form-label small mb-1">Away Team</label>
          <select class="form-select form-select-sm" id="assign-away-select">
            <option value="">(unassigned)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary btn-sm" id="assign-confirm-btn">Assign</button>
      </div>
    </div>
  </div>
</div>


<!-- Close Week Modal -->
<div class="modal fade" id="close-week-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Review &amp; Close Week</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="close-week-modal-body">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="close-week-confirm-btn">Confirm Close</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="reopen-week-modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Reopen Week</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="reopen-week-modal-body">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-warning" id="reopen-week-confirm-btn">Confirm Reopen</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/app.js" defer></script>
    <script type="module" src="/domains/rules/rules-domain.js"></script>
    <script type="module" src="/domains/teams/index.js"></script>
    <script type="module" src="/domains/handicaps/handicaps-domain.js"></script>
    <script type="module" src="/domains/seasons/seasons-domain.js"></script>
    <script type="module" src="/domains/lineups/lineups-domain.js"></script>
    <script type="module" src="/domains/matches/matches-domain.js"></script>
    <script type="module" src="/domains/schedules/schedules-domain.js"></script>
    <script type="module" src="/domains/standings/standings-domain.js"></script>
    <script type="module" src="/domains/players/players-domain.js"></script>
    <script type="module" src="/domains/dashboard/dashboard-domain.js"></script>
    <script type="module" src="/domains/leagues/leagues-domain.js"></script>
</body>
</html>
